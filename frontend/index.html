<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEOLINK HUB — B2B Connector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020205; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
      --text: #f1f5f9; --muted: #94a3b8; --accent: #8b5cf6; --accent-2: #3b82f6;
      --success: #10b981; --error: #f43f5e; --warning: #f59e0b;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: -1; opacity: 0.3; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--accent), transparent); top: -250px; left: -150px; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(2,2,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 1rem 5%; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.3rem; cursor: pointer; text-decoration: none; color: inherit; }
    .nav-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    
    .nav-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-family: inherit; }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-ghost:hover { border-color: var(--accent); background: var(--surface); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border: none; }
    .btn-success { background: var(--success); color: #fff; border: none; }

    .container { max-width: 1200px; margin: 3rem auto; padding: 0 5%; }
    .view-section { display: none; animation: fadeInUp 0.4s ease; }
    .view-active { display: block; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .section-header { margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 1.6rem; font-weight: 700; }
    .section-title span { color: var(--accent); }

    .layout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 3rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; backdrop-filter: blur(10px); height: fit-content; }
    
    .opp-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; position: relative; }
    .opp-item:hover { border-color: var(--accent); transform: translateX(5px); }
    .opp-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.5rem; display: block; }
    
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; }
    .badge-buyer { background: rgba(59,130,246,0.1); color: var(--accent-2); }
    .badge-seller { background: rgba(139,92,246,0.1); color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 2rem; }
    .modal { background: #08080c; border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 550px; padding: 3rem; position: relative; }
    
    .form-group { margin-bottom: 1.25rem; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }
    input, select, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 0.8rem; font-family: inherit; outline: none; }
    
    .banner { padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.85rem; display: none; }
    .banner-success { display: block; background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid var(--success); }

    @media (max-width: 900px) { .layout-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <nav>
    <a href="#" class="nav-logo" onclick="showView('marketplace')">
      <div class="nav-logo-icon">🔗</div><span>NEOLINK HUB</span>
    </a>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <div class="container">
    
    <!-- VISTA: MARKETPLACE -->
    <div id="view-marketplace" class="view-section view-active">
      <div class="layout-grid">
        <section>
          <div class="section-header"><h2 class="section-title">Marketplace <span>B2B</span></h2></div>
          <div id="marketplaceGrid"></div>
        </section>
        <aside id="sellerSidebar">
          <div class="card">
            <h3 style="margin-bottom:1rem">Publicar <span>Oportunidad</span></h3>
            <div id="publishBanner" class="banner"></div>
            <form id="listingForm">
              <div class="form-group"><label>Título</label><input id="title" type="text" placeholder="Ej: Servicio de Logística Tipo 3" required /></div>
              <div class="form-group"><label>Descripción</label><textarea id="description" placeholder="Detalles de la oferta..." required></textarea></div>
              <div class="form-group">
                <label>Dirigido a Comprador:</label>
                <select id="category">
                  <option value="tipo-1">Tipo 1 (Consumo)</option>
                  <option value="tipo-2">Tipo 2 (Industrial)</option>
                  <option value="tipo-3">Tipo 3 (Servicios)</option>
                  <option value="tipo-4">Tipo 4 (Tecnología)</option>
                  <option value="tipo-5">Tipo 5 (Gobierno)</option>
                </select>
              </div>
              <div class="form-group"><label>Precio Sugerido (USD)</label><input id="price" type="number" step="0.01" required /></div>
              <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Publicar</button>
            </form>
          </div>
        </aside>
      </div>
    </div>

    <!-- VISTA: ACTIVIDAD -->
    <div id="view-activity" class="view-section">
      <div class="section-header"><h2 class="section-title">Actividad y <span>Leads</span></h2></div>
      <div class="card">
        <table>
          <thead><tr><th>Oportunidad / Mensaje</th><th>Usuario</th><th>Tipo</th><th>Fecha</th></tr></thead>
          <tbody id="activityTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- VISTA: ADMIN -->
    <div id="view-admin" class="view-section">
      <div class="section-header"><h2 class="section-title">Panel de <span>Trazabilidad</span></h2></div>
      <div class="card">
        <table>
          <thead><tr><th>Oportunidad</th><th>Actor</th><th>Acción / Mensaje</th><th>Fecha</th></tr></thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <span style="position:absolute;top:1.5rem;right:1.5rem;cursor:pointer" onclick="closeModal()">✕</span>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api/v1';
    let currentUser = JSON.parse(localStorage.getItem('user')) || null;
    let marketplaceData = [];

    function showView(view) {
      document.querySelectorAll('.view-section').forEach(v => v.classList.remove('view-active'));
      document.getElementById(`view-${view}`).classList.add('view-active');
      if (view === 'activity') loadActivity();
      if (view === 'admin') loadAdminTrazability();
      if (view === 'marketplace') loadMarketplace();
    }

    function updateUI() {
      const navActions = document.getElementById('navActions');
      const sellerSidebar = document.getElementById('sellerSidebar');
      if (currentUser) {
        let adminBtn = currentUser.role === 'admin' ? `<button class="btn btn-ghost" onclick="showView('admin')">🛡️ Trazabilidad</button>` : '';
        navActions.innerHTML = `
          ${adminBtn}
          <button class="btn btn-ghost" onclick="showView('activity')">📊 Actividad</button>
          <div style="text-align:right; margin: 0 10px">
            <div style="font-size:0.7rem; color:var(--muted)">${currentUser.role.toUpperCase()}</div>
            <div style="font-size:0.8rem; font-weight:700">${currentUser.full_name}</div>
          </div>
          <button class="btn btn-ghost" onclick="logout()" style="color:var(--error)">Salir</button>
        `;
        sellerSidebar.style.display = (currentUser.role === 'seller' || currentUser.role === 'admin') ? 'block' : 'none';
      } else {
        navActions.innerHTML = `<button class="btn btn-ghost" onclick="openAuth('login')">Entrar</button><button class="btn btn-primary" onclick="openAuth('register')">Registrarse</button>`;
        sellerSidebar.style.display = 'none';
      }
    }

    async function loadMarketplace() {
      const grid = document.getElementById('marketplaceGrid');
      try {
        const res = await fetch(`${API}/opportunities`);
        const { data } = await res.json();
        marketplaceData = data;
        grid.innerHTML = data.map((item, i) => `
          <div class="opp-item" onclick="openDetails(${i})">
            <span class="opp-tag">${item.category.replace(/-/g, ' ')}</span>
            <div style="font-weight:700; font-size:1.2rem; margin-bottom:0.5rem">${item.title}</div>
            <div style="font-size:0.9rem; color:var(--muted); line-height:1.5">${item.description.substring(0,100)}...</div>
            <div style="margin-top:1rem; font-weight:800">$${parseFloat(item.price).toFixed(2)}</div>
          </div>
        `).join('');
      } catch (e) { grid.innerHTML = 'Error de conexión.'; }
    }

    async function loadActivity() {
      const tbody = document.getElementById('activityTableBody');
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Cargando...</td></tr>';
      const param = currentUser.role === 'seller' ? `seller_id=${currentUser.id}` : `user_id=${currentUser.id}`;
      try {
        const res = await fetch(`${API}/interactions?${param}`);
        const { data } = await res.json();
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:3rem; color:var(--muted)">No hay actividad aún.</td></tr>'; return; }
        tbody.innerHTML = data.map(i => `
          <tr>
            <td><div style="font-weight:700">${i.opportunity_title}</div><div style="font-size:0.75rem; color:var(--accent)">${i.message || '(Sin mensaje)'}</div></td>
            <td>${i.user_name}</td>
            <td><span class="badge ${i.type==='access'?'badge-buyer':'badge-seller'}">${i.type.toUpperCase()}</span></td>
            <td style="font-size:0.75rem">${new Date(i.created_at).toLocaleString()}</td>
          </tr>
        `).join('');
      } catch (e) { tbody.innerHTML = 'Error.'; }
    }

    async function loadAdminTrazability() {
      const tbody = document.getElementById('adminTableBody');
      try {
        const res = await fetch(`${API}/interactions`);
        const { data } = await res.json();
        tbody.innerHTML = data.map(i => `
          <tr>
            <td>${i.opportunity_title}</td>
            <td>${i.user_name}</td>
            <td>
              <span class="badge ${i.type==='access'?'badge-buyer':'badge-seller'}">${i.type.toUpperCase()}</span>
              ${i.message ? `<div style="font-size:0.7rem; color:var(--muted); margin-top:4px">"${i.message}"</div>` : ''}
            </td>
            <td style="font-size:0.7rem">${new Date(i.created_at).toLocaleString()}</td>
          </tr>
        `).join('');
      } catch (e) { tbody.innerHTML = 'Error.'; }
    }

    async function recordInteraction(oppId, type, msg = '') {
      if (!currentUser) return;
      await fetch(`${API}/interactions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ opportunity_id: oppId, user_id: currentUser.id, type, message: msg })
      });
    }

    function openDetails(i) {
      const item = marketplaceData[i];
      recordInteraction(item.id, 'access');
      document.getElementById('modalOverlay').style.display = 'flex';
      let actionBtn = (currentUser && currentUser.role === 'buyer') 
        ? `<button class="btn btn-success" style="width:100%" onclick="sendProposal('${item.id}')">Enviar Propuesta / Interés</button>` 
        : `<p style="font-size:0.7rem; color:var(--muted)">Entra como Comprador para responder.</p>`;
      document.getElementById('modalContent').innerHTML = `
        <span class="opp-tag">${item.category}</span><h2 style="margin: 1rem 0">${item.title}</h2>
        <div style="background:var(--surface); padding:1.5rem; border-radius:12px; margin-bottom:1.5rem; line-height:1.6">${item.description}</div>
        <div style="font-size:1.5rem; font-weight:800; margin-bottom:2rem">$${item.price}</div>${actionBtn}
      `;
    }

    async function sendProposal(oppId) {
      const msg = prompt("Escribe tu propuesta:");
      if (!msg) return;
      await recordInteraction(oppId, 'proposal', msg);
      alert('¡Enviado!'); closeModal(); loadActivity();
    }

    function openAuth(type) {
      document.getElementById('modalOverlay').style.display = 'flex';
      const isReg = type === 'register';
      document.getElementById('modalContent').innerHTML = `
        <h2 style="margin-bottom:1.5rem">${isReg ? 'Crear Cuenta' : 'Entrar'}</h2>
        <form onsubmit="handleAuth(event, '${type}')">
          ${isReg ? `<div class="form-group"><label>Nombre</label><input id="aName" required /></div>` : ''}
          <div class="form-group"><label>Email</label><input id="aEmail" type="email" required /></div>
          <div class="form-group"><label>Password</label><input id="aPass" type="password" required /></div>
          ${isReg ? `<div class="form-group"><label>Soy un:</label><select id="aRole"><option value="seller">Vendedor</option><option value="buyer">Comprador</option></select></div>` : ''}
          <button type="submit" class="btn btn-primary" style="width:100%">${isReg ? 'Registrar' : 'Entrar'}</button>
        </form>
      `;
    }

    async function handleAuth(e, type) {
      e.preventDefault();
      const email = document.getElementById('aEmail').value;
      const password = document.getElementById('aPass').value;
      const full_name = document.getElementById('aName')?.value || 'Usuario';
      const role = document.getElementById('aRole')?.value || 'buyer';
      try {
        const res = await fetch(`${API}/auth/${type}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, full_name, role }) });
        const data = await res.json();
        if (res.ok && type === 'login') { currentUser = data.data.user; localStorage.setItem('user', JSON.stringify(currentUser)); closeModal(); updateUI(); showView('marketplace'); }
        else if (res.ok) openAuth('login');
      } catch (e) { alert('Error'); }
    }

    function logout() { currentUser = null; localStorage.clear(); updateUI(); showView('marketplace'); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    updateUI(); loadMarketplace();
  </script>
</body>
</html>
